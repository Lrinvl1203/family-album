<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#100e0c">
<title>우리 가족 앨범</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#100e0c;
  --surface:#1e1a16;
  --surface2:#2a2420;
  --border:#3a3028;
  --accent:#d4956a;
  --accent2:#e8b48a;
  --text:#f5f0ea;
  --muted:#9a8f84;
  --radius:14px;
}

body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}

/* ── 잠금화면 ── */
#lock{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 30% 40%,#2a1f15 0%,#100e0c 60%,#0a1018 100%);
  display:flex;align-items:center;justify-content:center;z-index:100;
}

.lock-wrap{width:100%;max-width:340px;padding:0 24px;text-align:center}

.lock-icon{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,var(--accent),#8b5e3c);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:36px;margin-bottom:24px;
  box-shadow:0 8px 32px rgba(212,149,106,.3);
}

.lock-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.lock-sub{font-size:14px;color:var(--muted);margin-bottom:36px}

.pw-wrap{position:relative;margin-bottom:12px}
.pw-input{
  width:100%;padding:15px 48px 15px 16px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-size:16px;outline:none;
  transition:border-color .2s;
}
.pw-input:focus{border-color:var(--accent)}
.pw-input.shake{animation:shake .35s}
.pw-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;
  padding:4px;
}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}

.pw-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent),#c07840);
  border:none;border-radius:12px;
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  transition:opacity .2s,transform .1s;letter-spacing:.3px;
}
.pw-btn:hover{opacity:.9}
.pw-btn:active{transform:scale(.98)}
.pw-error{font-size:13px;color:#e06060;margin-top:10px;min-height:18px}

/* ── 앱 ── */
#app{display:none}

/* ── 헤더 ── */
.app-header{
  position:sticky;top:0;
  background:rgba(16,14,12,.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;
  display:flex;align-items:center;gap:12px;z-index:20;
}

.back-btn{
  background:none;border:none;color:var(--text);
  font-size:22px;cursor:pointer;padding:4px 8px 4px 0;
  display:none;
}

.header-title{font-size:18px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-count{font-size:12px;color:var(--muted);background:var(--surface2);padding:3px 10px;border-radius:20px;white-space:nowrap}

.logout-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;
  transition:all .2s;white-space:nowrap;
}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── 앨범 커버 그리드 ── */
#album-list{padding:24px 20px}

.section-intro{margin-bottom:28px}
.section-intro h2{font-size:22px;font-weight:700;margin-bottom:4px}
.section-intro p{font-size:14px;color:var(--muted)}

.albums-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

.album-card{
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  background:var(--surface);
  transition:transform .25s,box-shadow .25s;
  position:relative;
}
.album-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}

.album-cover{
  aspect-ratio:1;overflow:hidden;position:relative;
  background:var(--surface2);
}

.album-cover-grid{
  position:absolute;inset:0;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:2px;
}

.album-cover-grid img{
  width:100%;height:100%;object-fit:cover;
  transition:opacity .4s;
}
.album-cover-grid img.loading{opacity:0}

/* 사진 1장인 경우 */
.album-cover-grid.single{grid-template-columns:1fr;grid-template-rows:1fr}

.album-info{padding:14px 14px 16px}
.album-name{font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-meta{font-size:12px;color:var(--muted);display:flex;gap:10px}

/* ── 갤러리 뷰 ── */
#gallery-view{display:none;padding:20px}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
}

/* 매 7번째 아이템 크게 */
.media-card:nth-child(7n+1){grid-column:span 2;grid-row:span 2}

.media-card{
  position:relative;border-radius:10px;overflow:hidden;
  cursor:pointer;background:var(--surface2);
  aspect-ratio:1;
  transition:transform .2s,box-shadow .2s;
}
.media-card:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.4)}

.media-card img{
  width:100%;height:100%;object-fit:cover;
  transition:opacity .3s;display:block;
}
.media-card img.loading{opacity:0}

.video-badge{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.65);color:#fff;
  font-size:11px;padding:3px 8px;border-radius:6px;
  backdrop-filter:blur(4px);
}

.play-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.15);transition:background .2s;
}
.media-card:hover .play-overlay{background:rgba(0,0,0,.05)}

.play-icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.88);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;padding-left:2px;
}

.card-hover-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 10px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  opacity:0;transition:opacity .2s;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.media-card:hover .card-hover-info{opacity:1}
.card-meta{flex:1;min-width:0}
.card-name{font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-date{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}

.card-dl{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;text-decoration:none;
  flex-shrink:0;margin-left:6px;transition:background .2s;
}
.card-dl:hover{background:rgba(255,255,255,.32)}

/* 빈 상태 */
.empty{
  grid-column:1/-1;text-align:center;
  padding:80px 20px;color:var(--muted);
}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty-text{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;line-height:1.6}

/* ── 라이트박스 ── */
#lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.95);z-index:200;
  align-items:center;justify-content:center;
}
#lightbox.open{display:flex}

.lb-close{
  position:fixed;top:16px;right:16px;
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:40px;height:40px;border-radius:50%;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:201;
}
.lb-close:hover{background:rgba(255,255,255,.22)}

.lb-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:44px;height:44px;border-radius:50%;font-size:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,opacity .2s;z-index:201;
}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-nav.hidden{opacity:0;pointer-events:none}
#lb-prev{left:16px}
#lb-next{right:16px}

#lb-content{
  max-width:92vw;max-height:86vh;
  display:flex;align-items:center;justify-content:center;
}
#lb-content img{
  max-width:92vw;max-height:86vh;
  object-fit:contain;border-radius:8px;
  user-select:none;
}
#lb-content iframe{
  width:min(92vw,960px);height:min(86vh,540px);
  border:none;border-radius:8px;
}

.lb-footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 20px;
  background:linear-gradient(transparent,rgba(0,0,0,.8));
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.lb-caption{font-size:13px;color:rgba(255,255,255,.7);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-counter{font-size:13px;color:rgba(255,255,255,.5);white-space:nowrap}
.lb-dl{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;padding:6px 16px;border-radius:8px;
  font-size:13px;cursor:pointer;text-decoration:none;
  white-space:nowrap;transition:background .2s;
}
.lb-dl:hover{background:rgba(255,255,255,.22)}

/* 스크롤 fade-in */
.fade-in{opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s}
.fade-in.visible{opacity:1;transform:none}

@media(max-width:600px){
  .albums-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .gallery-grid{grid-template-columns:repeat(3,1fr);gap:4px}
  .media-card:nth-child(7n+1){grid-column:span 1;grid-row:span 1}
  .media-card{border-radius:6px}
  #lb-prev{left:8px}#lb-next{right:8px}
  .lb-nav{width:36px;height:36px;font-size:18px}
}
</style>
</head>
<body>

<!-- 잠금화면 -->
<div id="lock">
  <div class="lock-wrap">
    <div class="lock-icon">📷</div>
    <div class="lock-title">우리 가족 앨범</div>
    <div class="lock-sub">가족만 볼 수 있는 소중한 순간들</div>
    <div class="pw-wrap">
      <input type="password" class="pw-input" id="pw-input" placeholder="비밀번호"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')checkPw()">
      <button class="pw-eye" onclick="toggleEye()" id="pw-eye">👁</button>
    </div>
    <button class="pw-btn" onclick="checkPw()">앨범 열기</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <header class="app-header">
    <button class="back-btn" id="back-btn" onclick="showAlbumList()">‹</button>
    <div class="header-title" id="header-title">우리 가족 앨범</div>
    <span class="header-count" id="header-count">2개</span>
    <button class="logout-btn" onclick="logout()">나가기</button>
  </header>

  <div id="album-list"></div>
  <div id="gallery-view"></div>
</div>

<!-- 라이트박스 -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="navLb(-1)">‹</button>
  <div id="lb-content"></div>
  <button class="lb-nav" id="lb-next" onclick="navLb(1)">›</button>
  <div class="lb-footer">
    <div class="lb-caption" id="lb-caption"></div>
    <div class="lb-counter" id="lb-counter"></div>
    <a class="lb-dl" id="lb-dl" href="#">↓ 저장</a>
  </div>
</div>

<script>
const HASH = "154b954316c3e37522e3b719ab38fbe1ad347bd77d5eadebc4305c356901c02f";
const DATA = {"type": "flat", "media": [{"id": "1i3Z-nb2qISGs09vc2prFAcR3hAIztx6d", "name": "사업성평가_skill.mp4", "type": "video", "date": "2026-03-15"}, {"id": "12huYQaXBimaeUMiN0ZWokwPc7_GOk7FW", "name": "수유계산기.mp4", "type": "video", "date": "2026-03-15"}]};
let currentAlbumMedia = [];
let lbIndex = 0;
let touchStartX = 0;

// ── 인증 ──────────────────────────────────────────────────────────────

async function hashPw(s){
  const buf = await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPw(){
  const input = document.getElementById('pw-input');
  const err   = document.getElementById('pw-error');
  const h = await hashPw(input.value);
  if(h===HASH){
    sessionStorage.setItem('album_ok',HASH);
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }else{
    input.classList.add('shake');
    err.textContent='비밀번호가 틀렸습니다';
    setTimeout(()=>{input.classList.remove('shake');input.value='';input.focus()},360);
  }
}

function toggleEye(){
  const i=document.getElementById('pw-input');
  i.type=i.type==='password'?'text':'password';
}

function logout(){sessionStorage.removeItem('album_ok');location.reload()}

(async()=>{
  if(sessionStorage.getItem('album_ok')===HASH){
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }
})();

// ── 앱 초기화 ─────────────────────────────────────────────────────────

function initApp(){
  if(DATA.type==='flat'){
    currentAlbumMedia=DATA.media;
    showGallery(DATA.media,'전체');
    document.getElementById('back-btn').style.display='none';
  }else{
    showAlbumList();
  }
  setupObserver();
}

// ── 앨범 목록 ─────────────────────────────────────────────────────────

function showAlbumList(){
  const list=document.getElementById('album-list');
  const gal =document.getElementById('gallery-view');
  const back=document.getElementById('back-btn');
  const title=document.getElementById('header-title');
  const count=document.getElementById('header-count');

  gal.style.display='none';
  list.style.display='block';
  back.style.display='none';
  title.textContent='우리 가족 앨범';
  const total=DATA.sections.reduce((a,s)=>a+s.media.length,0);
  count.textContent=total+'개';

  const sections=DATA.sections;
  if(!sections||sections.length===0){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🌄</div><div class="empty-text">앨범이 비어있어요</div><div class="empty-sub">Google Drive FamilyAlbum 폴더에<br>사진이나 동영상을 추가해 보세요</div></div>`;
    return;
  }

  list.innerHTML=`
    <div class="section-intro fade-in">
      <h2>앨범</h2>
      <p>${sections.length}개의 앨범 · ${total}개의 추억</p>
    </div>
    <div class="albums-grid">
      ${sections.map((s,i)=>albumCard(s,i)).join('')}
    </div>`;
  setupObserver();
}

function albumCard(section,idx){
  const preview=section.media.slice(0,4);
  const count=section.media.length;
  const gridClass=preview.length===1?'single':'';
  const imgs=preview.map(m=>
    `<img src="https://drive.google.com/thumbnail?id=${m.id}&sz=w400"
          class="loading" onload="this.classList.remove('loading')"
          onerror="this.style.background='#2a2420'">`
  ).join('');
  return `
    <div class="album-card fade-in" onclick="openSection(${idx})">
      <div class="album-cover">
        <div class="album-cover-grid ${gridClass}">${imgs}</div>
      </div>
      <div class="album-info">
        <div class="album-name">${section.name}</div>
        <div class="album-meta">
          <span>${count}개</span>
          ${section.media[0]?`<span>${section.media[0].date.slice(0,7)}</span>`:''}
        </div>
      </div>
    </div>`;
}

function openSection(idx){
  const section=DATA.sections[idx];
  currentAlbumMedia=section.media;
  showGallery(section.media,section.name);
}

// ── 갤러리 ────────────────────────────────────────────────────────────

function showGallery(media,name){
  const list=document.getElementById('album-list');
  const gal =document.getElementById('gallery-view');
  const back=document.getElementById('back-btn');
  const title=document.getElementById('header-title');
  const count=document.getElementById('header-count');

  list.style.display='none';
  gal.style.display='block';
  if(DATA.type==='sections')back.style.display='block';
  title.textContent=name;
  count.textContent=media.length+'개';

  if(!media.length){
    gal.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">사진이 없어요</div></div>`;
    return;
  }

  gal.innerHTML=`<div class="gallery-grid">${media.map((m,i)=>mediaCard(m,i)).join('')}</div>`;
  setupObserver();
}

function mediaCard(m,i){
  const thumb=`https://drive.google.com/thumbnail?id=${m.id}&sz=w800`;
  const dlUrl=`https://drive.google.com/uc?export=download&id=${m.id}`;
  const badge=m.type==='video'?'<span class="video-badge">🎬</span>':'';
  const overlay=m.type==='video'?'<div class="play-overlay"><div class="play-icon">▶</div></div>':'';
  return `
    <div class="media-card fade-in" onclick="openLb(${i})">
      <img src="${thumb}" loading="lazy" class="loading"
           onload="this.classList.remove('loading')"
           onerror="this.style.opacity='0'">
      ${overlay}${badge}
      <div class="card-hover-info">
        <div class="card-meta">
          <div class="card-name">${m.name}</div>
          <div class="card-date">${m.date}</div>
        </div>
        <a class="card-dl" href="${dlUrl}" download="${m.name}"
           onclick="event.stopPropagation()" title="저장">↓</a>
      </div>
    </div>`;
}

// ── 라이트박스 ────────────────────────────────────────────────────────

function openLb(i){
  lbIndex=i;
  renderLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
  document.addEventListener('keydown',lbKey);
}

function closeLb(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-content').innerHTML='';
  document.body.style.overflow='';
  document.removeEventListener('keydown',lbKey);
}

function navLb(dir){
  lbIndex=(lbIndex+dir+currentAlbumMedia.length)%currentAlbumMedia.length;
  renderLb();
}

function renderLb(){
  const m=currentAlbumMedia[lbIndex];
  const total=currentAlbumMedia.length;
  const dlUrl=`https://drive.google.com/uc?export=download&id=${m.id}`;
  const content=document.getElementById('lb-content');

  content.style.opacity='0';
  setTimeout(()=>{
    if(m.type==='image'){
      content.innerHTML=`<img src="https://drive.google.com/uc?export=view&id=${m.id}" alt="${m.name}">`;
    }else{
      content.innerHTML=`<iframe src="https://drive.google.com/file/d/${m.id}/preview" allowfullscreen></iframe>`;
    }
    content.style.opacity='1';
    content.style.transition='opacity .2s';
  },80);

  document.getElementById('lb-caption').textContent=m.name;
  document.getElementById('lb-counter').textContent=`${lbIndex+1} / ${total}`;
  document.getElementById('lb-dl').href=dlUrl;
  document.getElementById('lb-dl').download=m.name;
  document.getElementById('lb-prev').classList.toggle('hidden',total<=1);
  document.getElementById('lb-next').classList.toggle('hidden',total<=1);
}

function lbKey(e){
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')navLb(-1);
  if(e.key==='ArrowRight')navLb(1);
}

// 라이트박스 배경 클릭 닫기
document.getElementById('lightbox').addEventListener('click',e=>{
  if(e.target===e.currentTarget)closeLb();
});

// 스와이프 지원
document.getElementById('lightbox').addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
},{passive:true});
document.getElementById('lightbox').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50)navLb(dx<0?1:-1);
},{passive:true});

// ── 스크롤 fade-in ────────────────────────────────────────────────────

function setupObserver(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible')});
  },{threshold:.08});
  document.querySelectorAll('.fade-in:not(.visible)').forEach(el=>obs.observe(el));
}
</script>
</body>
</html>
